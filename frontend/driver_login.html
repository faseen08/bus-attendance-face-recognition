<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 text-white flex items-center justify-center min-h-screen">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 bg-purple-600">
                <i data-feather="truck" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold">Driver Login</h1>
            <p class="text-slate-400 mt-2">Access your driver dashboard</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">Driver ID</label>
                <input id="uid" type="text" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none transition" placeholder="Enter driver ID (e.g., DRV001)" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">Password</label>
                <input id="pwd" type="password" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none transition" placeholder="••••••••" required>
            </div>

            <button type="submit" id="btn" class="w-full py-3 rounded-lg font-bold text-white transition-all transform active:scale-95 shadow-lg bg-purple-600 hover:bg-purple-500 shadow-purple-900/20">
                Sign In
            </button>
        </form>

        <div id="error-msg" class="mt-4 text-center text-red-400 font-medium hidden"></div>

        <div class="mt-4 text-center space-x-4">
            <button id="createToggle" type="button" class="text-sm text-purple-400 hover:text-purple-300">
                Create driver account
            </button>
            <button id="forgotToggle" type="button" class="text-sm text-purple-400 hover:text-purple-300">
                Forgot password?
            </button>
        </div>

        <div id="createSection" class="mt-4 p-4 bg-slate-900 rounded-lg border border-slate-700 hidden">
            <h3 class="text-sm font-semibold mb-3">Request Driver Account</h3>
            <div class="space-y-3">
                <input id="createId" type="text" class="w-full p-2 rounded bg-slate-800" placeholder="Driver ID">
                <input id="createName" type="text" class="w-full p-2 rounded bg-slate-800" placeholder="Full Name">
                <input id="createBusNumber" type="text" class="w-full p-2 rounded bg-slate-800" placeholder="Bus Number">
                <input id="createPhone" type="text" class="w-full p-2 rounded bg-slate-800" placeholder="Phone (+91...)">
                <input id="createLicense" type="text" class="w-full p-2 rounded bg-slate-800" placeholder="License Number (optional)">
                <input id="createPassword" type="password" class="w-full p-2 rounded bg-slate-800" placeholder="Password">
                <input id="createConfirmPassword" type="password" class="w-full p-2 rounded bg-slate-800" placeholder="Confirm Password">
                <button id="createBtn" type="button" class="w-full py-2 rounded bg-purple-600 hover:bg-purple-500 font-semibold">
                    Submit Request
                </button>
            </div>
            <div id="createMsg" class="mt-3 text-sm hidden"></div>
        </div>

        <div id="forgotSection" class="mt-4 p-4 bg-slate-900 rounded-lg border border-slate-700 hidden">
            <h3 class="text-sm font-semibold mb-3">Reset Password (Driver)</h3>
            <div class="space-y-3">
                <input id="forgotId" type="text" class="w-full p-2 rounded bg-slate-800" placeholder="Driver ID">
                <input id="forgotPhone" type="text" class="w-full p-2 rounded bg-slate-800" placeholder="Phone (+91...)">
                <input id="forgotNewPwd" type="password" class="w-full p-2 rounded bg-slate-800" placeholder="New Password">
                <input id="forgotConfirmPwd" type="password" class="w-full p-2 rounded bg-slate-800" placeholder="Confirm New Password">
                <button id="forgotBtn" type="button" class="w-full py-2 rounded bg-purple-600 hover:bg-purple-500 font-semibold">
                    Reset Password
                </button>
            </div>
            <div id="forgotMsg" class="mt-3 text-sm hidden"></div>
        </div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-slate-500 hover:text-slate-300 text-sm flex items-center justify-center gap-2">
                <i data-feather="arrow-left" class="w-4 h-4"></i> Back to Selection
            </a>
        </div>
    </div>

    <!-- Include the API utility helper before other scripts -->
    <script>window.APP_ROLE = 'driver';</script>
    <script src="api.js"></script>

    <script>
        const role = 'driver';
        
        // Elements
        const btn = document.getElementById('btn');
        const uid = document.getElementById('uid');
        const pwd = document.getElementById('pwd');
        const errorMsg = document.getElementById('error-msg');
        const createToggle = document.getElementById('createToggle');
        const createSection = document.getElementById('createSection');
        const createId = document.getElementById('createId');
        const createName = document.getElementById('createName');
        const createBusNumber = document.getElementById('createBusNumber');
        const createPhone = document.getElementById('createPhone');
        const createLicense = document.getElementById('createLicense');
        const createPassword = document.getElementById('createPassword');
        const createConfirmPassword = document.getElementById('createConfirmPassword');
        const createBtn = document.getElementById('createBtn');
        const createMsg = document.getElementById('createMsg');
        const forgotToggle = document.getElementById('forgotToggle');
        const forgotSection = document.getElementById('forgotSection');
        const forgotId = document.getElementById('forgotId');
        const forgotPhone = document.getElementById('forgotPhone');
        const forgotNewPwd = document.getElementById('forgotNewPwd');
        const forgotConfirmPwd = document.getElementById('forgotConfirmPwd');
        const forgotBtn = document.getElementById('forgotBtn');
        const forgotMsg = document.getElementById('forgotMsg');

        // Handle Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden'); // Hide error on new submit
            btn.disabled = true;
            btn.innerText = 'Signing in...';

            const username = uid.value;
            const password = pwd.value;
            
            try {
                // Use our API utility to login
                // This automatically stores the token if successful
                const result = await login(username, password, role);
                
                if (result.error) {
                    // Login failed
                    errorMsg.innerText = `❌ ${result.error}`;
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = 'Sign In';
                } else {
                    // Login successful - token is stored automatically
                    // Redirect to driver dashboard
                    window.location.href = 'driver_dashboard.html';
                }
            } catch (error) {
                console.error("Login error:", error);
                errorMsg.innerText = '❌ Failed to connect to the server.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = 'Sign In';
            }
        });

        createToggle.addEventListener('click', () => {
            createSection.classList.toggle('hidden');
            createId.value = uid.value || '';
            createMsg.classList.add('hidden');
        });

        createBtn.addEventListener('click', async () => {
            createMsg.classList.add('hidden');
            const passwordVal = createPassword.value;
            const confirmVal = createConfirmPassword.value;
            if (!createId.value || !createName.value || !createBusNumber.value || !createPhone.value || !passwordVal || !confirmVal) {
                createMsg.className = 'mt-3 text-sm text-amber-400';
                createMsg.textContent = 'Please fill required fields.';
                createMsg.classList.remove('hidden');
                return;
            }
            if (passwordVal.length < 6) {
                createMsg.className = 'mt-3 text-sm text-amber-400';
                createMsg.textContent = 'Password must be at least 6 characters.';
                createMsg.classList.remove('hidden');
                return;
            }
            if (passwordVal !== confirmVal) {
                createMsg.className = 'mt-3 text-sm text-amber-400';
                createMsg.textContent = 'Passwords do not match.';
                createMsg.classList.remove('hidden');
                return;
            }

            createBtn.disabled = true;
            createBtn.innerText = 'Submitting...';
            try {
                const result = await apiCallJSON('/requests/driver', {
                    method: 'POST',
                    body: {
                        driver_id: createId.value.trim(),
                        name: createName.value.trim(),
                        bus_number: createBusNumber.value.trim(),
                        phone: createPhone.value.trim(),
                        license_number: createLicense.value.trim() || null,
                        password: passwordVal
                    }
                });
                if (result?.error) {
                    throw new Error(result.error);
                }
                createMsg.className = 'mt-3 text-sm text-green-400';
                createMsg.textContent = 'Request submitted. Admin will approve your account.';
                createMsg.classList.remove('hidden');
                createSection.querySelectorAll('input').forEach((el) => { if (el.id !== 'createId') el.value = ''; });
            } catch (error) {
                createMsg.className = 'mt-3 text-sm text-red-400';
                createMsg.textContent = `Request failed: ${error.message}`;
                createMsg.classList.remove('hidden');
            } finally {
                createBtn.disabled = false;
                createBtn.innerText = 'Submit Request';
            }
        });

        forgotToggle.addEventListener('click', () => {
            forgotSection.classList.toggle('hidden');
            forgotId.value = uid.value || '';
            forgotMsg.classList.add('hidden');
        });

        forgotBtn.addEventListener('click', async () => {
            forgotMsg.classList.add('hidden');
            const username = (forgotId.value || '').trim();
            const phone = (forgotPhone.value || '').trim();
            const newPassword = forgotNewPwd.value;
            const confirmPassword = forgotConfirmPwd.value;

            if (!username || !phone || !newPassword || !confirmPassword) {
                forgotMsg.className = 'mt-3 text-sm text-amber-400';
                forgotMsg.textContent = 'Please fill all fields.';
                forgotMsg.classList.remove('hidden');
                return;
            }
            if (newPassword.length < 6) {
                forgotMsg.className = 'mt-3 text-sm text-amber-400';
                forgotMsg.textContent = 'Password must be at least 6 characters.';
                forgotMsg.classList.remove('hidden');
                return;
            }
            if (newPassword !== confirmPassword) {
                forgotMsg.className = 'mt-3 text-sm text-amber-400';
                forgotMsg.textContent = 'Passwords do not match.';
                forgotMsg.classList.remove('hidden');
                return;
            }

            forgotBtn.disabled = true;
            forgotBtn.innerText = 'Resetting...';
            try {
                const result = await apiCallJSON('/forgot-password', {
                    method: 'POST',
                    body: {
                        role: 'driver',
                        username: username,
                        phone: phone,
                        new_password: newPassword
                    }
                });
                if (result?.error) {
                    throw new Error(result.error);
                }
                forgotMsg.className = 'mt-3 text-sm text-green-400';
                forgotMsg.textContent = 'Password reset successful. You can sign in now.';
                forgotMsg.classList.remove('hidden');
            } catch (error) {
                forgotMsg.className = 'mt-3 text-sm text-red-400';
                forgotMsg.textContent = `Reset failed: ${error.message}`;
                forgotMsg.classList.remove('hidden');
            } finally {
                forgotBtn.disabled = false;
                forgotBtn.innerText = 'Reset Password';
            }
        });

        feather.replace();
    </script>
</body>
</html>
