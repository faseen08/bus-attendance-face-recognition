<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Students</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen">

  <header class="p-6 border-b border-slate-700 flex justify-between items-center">
    <h1 class="text-2xl font-bold">Students</h1>
    <div class="flex gap-3">
      <a href="admin_dashboard.html" class="text-blue-400 hover:underline">
        ← Back to Dashboard
      </a>
      <button onclick="logout()" class="bg-red-600 hover:bg-red-500 px-3 py-1 rounded transition text-sm">
        Logout
      </button>
    </div>
  </header>

  <main class="p-6">
    <div class="bg-slate-800 rounded-xl p-4 mb-4 border border-slate-700">
      <h2 class="text-lg font-semibold mb-3">Filter Students</h2>
      <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
        <div>
          <label class="block text-xs text-slate-400 mb-1">Education Type</label>
          <select id="filterEducationType" class="w-full p-2 rounded bg-slate-900 border border-slate-700">
            <option value="">All</option>
            <option value="college">College</option>
            <option value="school">School</option>
          </select>
        </div>
        <div id="filterCollegeYearWrap">
          <label class="block text-xs text-slate-400 mb-1">College Year</label>
          <select id="filterCollegeYear" class="w-full p-2 rounded bg-slate-900 border border-slate-700"></select>
        </div>
        <div id="filterCollegeDeptWrap">
          <label class="block text-xs text-slate-400 mb-1">Department</label>
          <select id="filterCollegeDept" class="w-full p-2 rounded bg-slate-900 border border-slate-700"></select>
        </div>
        <div id="filterSchoolClassWrap">
          <label class="block text-xs text-slate-400 mb-1">School Class</label>
          <select id="filterSchoolClass" class="w-full p-2 rounded bg-slate-900 border border-slate-700"></select>
        </div>
        <div id="filterSchoolDivWrap">
          <label class="block text-xs text-slate-400 mb-1">Division</label>
          <select id="filterSchoolDivision" class="w-full p-2 rounded bg-slate-900 border border-slate-700"></select>
        </div>
      </div>
      <div class="mt-3">
        <button id="resetFilters" class="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-sm">Reset Filters</button>
      </div>
    </div>

    <div class="bg-slate-800 rounded-xl shadow-lg overflow-hidden">
      <table class="w-full">
        <thead class="bg-slate-700 text-slate-300">
          <tr>
            <th class="p-3 text-left">Photo</th>
            <th class="p-3 text-left">Details</th>
            <th class="p-3 text-left">Education</th>
            <th class="p-3 text-left">Bus Stop</th>
            <th class="p-3 text-left">Status</th>
            <th class="p-3 text-left">Actions</th>
          </tr>
        </thead>
        <tbody id="studentsTable" class="divide-y divide-slate-700"></tbody>
      </table>
    </div>
  </main>

  <!-- Load API utility before other scripts -->
  <script>window.APP_ROLE = 'admin';</script>
  <script src="api.js"></script>
  <script src="/frontend/student.js"></script>
</body>
</html>
