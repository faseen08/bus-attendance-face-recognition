<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 text-white flex items-center justify-center min-h-screen">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 bg-amber-600">
                <i data-feather="user" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold">Student Login</h1>
            <p class="text-slate-400 mt-2">Access your student dashboard</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">Roll Number</label>
                <input id="uid" type="text" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition" placeholder="Enter roll number" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">Password</label>
                <input id="pwd" type="password" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition" placeholder="••••••••" required>
            </div>

            <button type="submit" id="btn" class="w-full py-3 rounded-lg font-bold text-white transition-all transform active:scale-95 shadow-lg bg-amber-600 hover:bg-amber-500 shadow-amber-900/20">
                Sign In
            </button>
        </form>

        <div id="error-msg" class="mt-4 text-center text-red-400 font-medium hidden"></div>

        <div class="mt-4 text-center">
            <button id="forgotToggle" type="button" class="text-sm text-amber-400 hover:text-amber-300">
                Forgot password?
            </button>
        </div>

        <div id="forgotSection" class="mt-4 p-4 bg-slate-900 rounded-lg border border-slate-700 hidden">
            <h3 class="text-sm font-semibold mb-3">Reset Password (Student)</h3>
            <div class="space-y-3">
                <input id="forgotId" type="text" class="w-full p-2 rounded bg-slate-800" placeholder="Roll Number">
                <input id="forgotPhone" type="text" class="w-full p-2 rounded bg-slate-800" placeholder="Parent Phone (+91...)">
                <input id="forgotNewPwd" type="password" class="w-full p-2 rounded bg-slate-800" placeholder="New Password">
                <input id="forgotConfirmPwd" type="password" class="w-full p-2 rounded bg-slate-800" placeholder="Confirm New Password">
                <button id="forgotBtn" type="button" class="w-full py-2 rounded bg-amber-600 hover:bg-amber-500 font-semibold">
                    Reset Password
                </button>
            </div>
            <div id="forgotMsg" class="mt-3 text-sm hidden"></div>
        </div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-slate-500 hover:text-slate-300 text-sm flex items-center justify-center gap-2">
                <i data-feather="arrow-left" class="w-4 h-4"></i> Back to Selection
            </a>
        </div>
    </div>

    <!-- Include the API utility helper before other scripts -->
    <script>window.APP_ROLE = 'student';</script>
    <script src="api.js"></script>

    <script>
        const role = 'student';
        
        // Elements
        const btn = document.getElementById('btn');
        const uid = document.getElementById('uid');
        const pwd = document.getElementById('pwd');
        const errorMsg = document.getElementById('error-msg');
        const forgotToggle = document.getElementById('forgotToggle');
        const forgotSection = document.getElementById('forgotSection');
        const forgotId = document.getElementById('forgotId');
        const forgotPhone = document.getElementById('forgotPhone');
        const forgotNewPwd = document.getElementById('forgotNewPwd');
        const forgotConfirmPwd = document.getElementById('forgotConfirmPwd');
        const forgotBtn = document.getElementById('forgotBtn');
        const forgotMsg = document.getElementById('forgotMsg');

        // Handle Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden'); // Hide error on new submit
            btn.disabled = true;
            btn.innerText = 'Signing in...';

            const username = uid.value;
            const password = pwd.value;
            
            try {
                // Use our API utility to login
                // This automatically stores the token if successful
                const result = await login(username, password, role);
                
                if (result.error) {
                    // Login failed
                    errorMsg.innerText = `❌ ${result.error}`;
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = 'Sign In';
                } else {
                    // Login successful - token is stored automatically
                    // Redirect to student dashboard
                    window.location.href = `student_dashboard.html?id=${username}`;
                }
            } catch (error) {
                console.error("Login error:", error);
                errorMsg.innerText = '❌ Failed to connect to the server.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = 'Sign In';
            }
        });

        forgotToggle.addEventListener('click', () => {
            forgotSection.classList.toggle('hidden');
            forgotId.value = uid.value || '';
            forgotMsg.classList.add('hidden');
        });

        forgotBtn.addEventListener('click', async () => {
            forgotMsg.classList.add('hidden');
            const username = (forgotId.value || '').trim();
            const phone = (forgotPhone.value || '').trim();
            const newPassword = forgotNewPwd.value;
            const confirmPassword = forgotConfirmPwd.value;

            if (!username || !phone || !newPassword || !confirmPassword) {
                forgotMsg.className = 'mt-3 text-sm text-amber-400';
                forgotMsg.textContent = 'Please fill all fields.';
                forgotMsg.classList.remove('hidden');
                return;
            }
            if (newPassword.length < 6) {
                forgotMsg.className = 'mt-3 text-sm text-amber-400';
                forgotMsg.textContent = 'Password must be at least 6 characters.';
                forgotMsg.classList.remove('hidden');
                return;
            }
            if (newPassword !== confirmPassword) {
                forgotMsg.className = 'mt-3 text-sm text-amber-400';
                forgotMsg.textContent = 'Passwords do not match.';
                forgotMsg.classList.remove('hidden');
                return;
            }

            forgotBtn.disabled = true;
            forgotBtn.innerText = 'Resetting...';
            try {
                const result = await apiCallJSON('/forgot-password', {
                    method: 'POST',
                    body: {
                        role: 'student',
                        username: username,
                        parent_phone: phone,
                        new_password: newPassword
                    }
                });
                if (result?.error) {
                    throw new Error(result.error);
                }
                forgotMsg.className = 'mt-3 text-sm text-green-400';
                forgotMsg.textContent = 'Password reset successful. You can sign in now.';
                forgotMsg.classList.remove('hidden');
            } catch (error) {
                forgotMsg.className = 'mt-3 text-sm text-red-400';
                forgotMsg.textContent = `Reset failed: ${error.message}`;
                forgotMsg.classList.remove('hidden');
            } finally {
                forgotBtn.disabled = false;
                forgotBtn.innerText = 'Reset Password';
            }
        });

        feather.replace();
    </script>
</body>
</html>
